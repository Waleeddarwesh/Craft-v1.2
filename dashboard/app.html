<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Craft Handcrafts Admin Dashboard — Manage orders, products, users, and more">
    <title>Craft Admin Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout" id="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar"></aside>

        <!-- Main Area -->
        <div class="main-area">
            <!-- Topbar -->
            <header class="topbar" id="topbar"></header>

            <!-- Page Content -->
            <main class="main-content" id="main-content">
                <div class="page-loader">
                    <div class="spinner spinner-lg"></div>
                    <p>Loading dashboard...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>

    <!-- Core Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/topbar.js"></script>
    <script src="js/components/stats-card.js"></script>
    <script src="js/components/table.js"></script>
    <script src="js/components/charts.js"></script>
    <script src="js/pages/overview.js"></script>
    <script src="js/pages/orders.js"></script>
    <script src="js/pages/returns.js"></script>
    <script src="js/pages/products.js"></script>
    <script src="js/pages/users.js"></script>
    <script src="js/pages/payments.js"></script>
    <script src="js/pages/withdrawals.js"></script>
    <script src="js/pages/courses.js"></script>
    <script src="js/pages/reviews.js"></script>
    <script src="js/pages/coupons.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/pages/notifications.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
